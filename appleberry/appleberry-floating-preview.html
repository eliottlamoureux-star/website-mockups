<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Berry Phone Repair — Hero Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; color: #0a0a0a; }

  /* Nav */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .nav-logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #0a0a0a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo span { color: #E53935; }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: rgba(0,0,0,0.6);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #0a0a0a; }
  .nav-cta {
    background: #E53935;
    color: #fff !important;
    padding: 8px 20px;
    border-radius: 100px;
    font-weight: 600 !important;
  }
  .nav-cta:hover { opacity: 0.9; }

  /* Float animation */
  @keyframes floatBob {
    0%, 100% { transform: translateY(0px) rotate(var(--rot, 0deg)); }
    50%       { transform: translateY(-18px) rotate(var(--rot, 0deg)); }
  }
  .float-img {
    position: absolute;
    object-fit: contain;
    animation: floatBob 4s ease-in-out infinite;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.14));
    border-radius: 12px;
    overflow: hidden;
  }

  /* Hero */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fff;
    padding: 80px 0;
  }

  .hero-center {
    position: relative;
    z-index: 20;
    text-align: center;
    max-width: 620px;
    padding: 0 24px;
  }
  .hero-eyebrow {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #E53935;
    margin-bottom: 16px;
    background: rgba(229,57,53,0.08);
    padding: 6px 14px;
    border-radius: 100px;
  }
  h1 {
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 900;
    color: #0a0a0a;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 22px;
  }
  h1 .accent { color: #E53935; }
  .hero-sub {
    font-size: 18px;
    color: rgba(0,0,0,0.52);
    line-height: 1.65;
    margin-bottom: 38px;
    font-weight: 400;
  }
  .hero-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: #E53935;
    color: #fff;
    padding: 15px 34px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(229,57,53,0.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(229,57,53,0.45);
  }
  .btn-secondary {
    background: transparent;
    color: #0a0a0a;
    padding: 15px 34px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 16px;
    text-decoration: none;
    border: 2px solid #e0e0e0;
    transition: border-color 0.2s, transform 0.2s;
  }
  .btn-secondary:hover {
    border-color: #aaa;
    transform: translateY(-2px);
  }

  /* Trust badges */
  .hero-trust {
    margin-top: 32px;
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(0,0,0,0.45);
  }
  .trust-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E53935;
    flex-shrink: 0;
  }
</style>
